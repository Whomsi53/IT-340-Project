<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OutOfStock | Cart</title>

    <link href="/style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/shopping-cart/style.css">
</head>

<body>
<div>

<header style="display:flex; align-items:center; justify-content:space-between;">
    <div class="nav-left">
        <div id="logo">
            <a href="/" style="text-decoration:none;">
                <h2 style="color:white; margin:0; font-weight:700;">OutOfStock</h2>
            </a>
        </div>
    </div>

    <nav class="nav-right">
        <div><a href="/login/">Login</a></div>
        <div>|</div>
        <div><a href="/shopping-cart/">Cart</a></div>
    </nav>
</header>

<main class="page">
<section class="shopping-cart dark">
<div class="container">

<div class="block-heading">
    <h3>Shopping Cart</h3>
</div>

<div class="content">
<div class="row">

<!-- ITEMS -->
<div class="col-md-12 col-lg-8">
    <div class="items" id="cartItems"></div>
</div>

<!-- SUMMARY -->
<div class="col-md-12 col-lg-4">
    <div class="summary">
        <h3>Summary</h3>

        <div class="summary-item">
            <span>Subtotal</span>
            <span id="subtotal">$0</span>
        </div>

        <div class="summary-item">
            <span>Shipping</span>
            <span id="shipping">$5.99</span>
        </div>

        <div class="summary-item">
            <span>Tax</span>
            <span id="tax">$0</span>
        </div>

        <div class="summary-item">
            <span>Total</span>
            <span id="total">$0</span>
        </div>

        <button 
            class="btn btn-dark w-100" 
            style="font-weight:800;"
            onclick="alert('Checkout system coming soon!');">
            Checkout
        </button>
    </div>
</div>

</div>
</div>

</div>
</section>
</main>

<footer>© 2026 OutOfStock. All rights reserved.</footer>

</div>

<script>
function loadCart() {
    let cart = JSON.parse(sessionStorage.getItem("cart")) || [];
    const container = document.getElementById("cartItems");

    container.innerHTML = "";

    let subtotal = 0;

    if (cart.length === 0) {
        container.innerHTML = "<p class='text-muted'>Your cart is empty.</p>";
        return;
    }

    cart.forEach((item, index) => {
        const price = parseFloat(item.productPrice.replace("$",""));
        subtotal += price * item.quantity;

        const div = document.createElement("div");
        div.className = "product mb-3 p-3 border rounded";

        div.innerHTML = `
            <div class="row align-items-center">
                <div class="col-md-2">
                    <img src="${item.productImg}" class="img-fluid">
                </div>

                <div class="col-md-4">
                    <p>${item.productName}</p>
                </div>

                <div class="col-md-3">
                    <div class="input-group">
                        <button class="btn btn-outline-secondary" onclick="changeQty(${index}, -1)">-</button>
                        <input type="text" class="form-control text-center" value="${item.quantity}" readonly>
                        <button class="btn btn-outline-secondary" onclick="changeQty(${index}, 1)">+</button>
                    </div>
                </div>

                <div class="col-md-2 text-end">
                    <span>$${(price * item.quantity).toFixed(2)}</span>
                </div>

                <div class="col-md-1 text-end">
                    <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">X</button>
                </div>
            </div>
        `;

        container.appendChild(div);
    });

    document.getElementById("subtotal").textContent = "$" + subtotal.toFixed(2);
    document.getElementById("total").textContent = "$" + (subtotal + 5.99).toFixed(2);
}

function changeQty(index, change) {
    let cart = JSON.parse(sessionStorage.getItem("cart"));

    cart[index].quantity += change;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    sessionStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function removeItem(index) {
    let cart = JSON.parse(sessionStorage.getItem("cart"));
    cart.splice(index, 1);
    sessionStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

loadCart();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
