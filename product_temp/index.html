<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OutOfStock | Product</title>

<link href="/style.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.product-layout {
    display: flex;
    gap: 60px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
}

.main-left img {
    width: 380px;
    border-radius: 12px;
}

.product-info {
    max-width: 420px;
}

#productName {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
}

.price {
    font-size: 22px;
    font-weight: 700;
    margin: 10px 0;
}

.rating {
    color: #f5b50a;
    font-size: 16px;
}

.review-card {
    border-top: 1px solid #ddd;
    padding: 12px 0;
}
</style>
</head>

<body>

<header>
    <div class="brand">
        <a href="/" style="text-decoration:none; color:white;">
            <h1>OutOfStock</h1>
        </a>
    </div>

    <div class="nav-center">
        <form class="search">
            <input placeholder="Search..." />
            <button type="submit">Search</button>
        </form>
    </div>

    <nav class="nav-right" id="navRight"></nav>
</header>

<main>

<div class="product-layout">

    <div class="main-left">
        <img id="productImg">
    </div>

    <div class="product-info">

        <p id="productName"></p>

        <div id="ratingSummary" class="rating"></div>

        <div class="price"></div>

        <p style="color:green; font-weight:bold;">✔ In Stock</p>

        <button class="add-to-cart w-100 mt-3" onclick="shoppingCartClick()">
            Add to Cart
        </button>

        <div style="margin-top:25px;">
            <h4>Product Details</h4>
            <p>High-quality synthetic blend. Imported.</p>
        </div>

        <div style="margin-top:20px;">
            <h4>About This Item</h4>
            <p>Clean, modern coat designed for everyday wear.</p>
        </div>

    </div>

</div>

<!-- REVIEWS -->
<div class="reviews-section">
    <h3>Customer Reviews</h3>

    <div id="reviewsList"></div>

    <div id="reviewForm" style="margin-top:20px;">
        <h5>Leave a review</h5>
        <textarea id="reviewText" class="form-control mb-2"></textarea>
        <input id="reviewRating" type="number" min="1" max="5" class="form-control mb-2">
        <button class="btn btn-dark w-100" onclick="submitReview()">Submit</button>
    </div>

    <p id="loginMessage" style="display:none;">Login to leave a review</p>
</div>

</main>

<footer>
© 2026 OutOfStock
</footer>

<script src="/frontend.js"></script>

<script>
// ========================
// NAVBAR
// ========================
function getUser() {
    try {
        return JSON.parse(sessionStorage.getItem("user"));
    } catch {
        return null;
    }
}

const user = getUser();
const nav = document.getElementById("navRight");

if (user && user.username) {
    nav.innerHTML = `
        <span>Hello, ${user.username}</span>
        <a href="#" id="logout-btn">Logout</a>
        <span>|</span>
        <a href="/shopping-cart/">Cart</a>
    `;

    document.getElementById("logout-btn").onclick = () => {
        sessionStorage.clear();
        window.location.href = "/";
    };

} else {
    nav.innerHTML = `
        <a href="/login/">Login</a>
        <span>|</span>
        <a href="/shopping-cart/">Cart</a>
    `;
}

// ========================
// 🔥 PRODUCT LOAD (FIXED)
// ========================
const product = JSON.parse(sessionStorage.getItem("selectedProduct"));

console.log("LOADED PRODUCT:", product);

let productId = null;

if (!product) {
    document.getElementById("productName").textContent = "No product loaded";
} else {
    document.getElementById("productName").textContent = product.name;
    document.querySelector(".price").textContent = product.price;
    document.getElementById("productImg").src = product.img;

    productId = product.name; // simple unique id
}

// ========================
// REVIEWS
// ========================
if (!user) {
    document.getElementById("reviewForm").style.display = "none";
    document.getElementById("loginMessage").style.display = "block";
}

function stars(n) {
    return "★".repeat(n) + "☆".repeat(5 - n);
}

function loadReviews() {
    if (!productId) return;

    fetch(`/api/reviews/${encodeURIComponent(productId)}`)
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("reviewsList");

        if (!data.reviews.length) {
            list.innerHTML = "<p>No reviews yet</p>";
            return;
        }

        const avg = (
            data.reviews.reduce((a,b)=>a+b.rating,0) /
            data.reviews.length
        ).toFixed(1);

        document.getElementById("ratingSummary").innerHTML =
            `${stars(Math.round(avg))} (${avg}/5)`;

        list.innerHTML = data.reviews.map(r => `
            <div class="review-card">
                <strong>${r.username}</strong>
                <div class="rating">${stars(r.rating)}</div>
                <p>${r.comment}</p>
            </div>
        `).join("");
    });
}

function submitReview() {
    const text = document.getElementById("reviewText").value;
    const rating = document.getElementById("reviewRating").value;

    fetch("/api/reviews", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-user-id": user?.id
        },
        body: JSON.stringify({
            product_id: productId,
            comment: text,
            rating: rating
        })
    }).then(() => {
        document.getElementById("reviewText").value = "";
        document.getElementById("reviewRating").value = "";
        loadReviews();
    });
}

loadReviews();
</script>

</body>
</html>
