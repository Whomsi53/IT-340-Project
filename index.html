<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" >
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>OutOfStock | Home</title>
        <link href="/style.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div>
            <header style="display:flex; align-items:center; justify-content:space-between;">
                <div class="nav-left" aria-label="site brand">
                    <div id="logo">
                        <a href="/" style="text-decoration:none;">
                            <h2 style="color:white; margin:0; font-weight:700;">

                </div>

                <div style="flex:1; display:flex; justify-content:center;">
                    <form class="d-flex" style="width: 40%;" onsubmit="event.preventDefault(); alert('Search coming soon');">
                        <input 
                            class="form-control me-2" 
                            type="search" 
                            placeholder="Search..." 
                            aria-label="Search">
                        <button class="btn btn-outline-light" type="submit">
                            Search
                        </button>
                    </form>
                </div>

                <nav class="nav-right" aria-label="user actions">
                    <div><a href="/login/">Login</a></div>
                        <div>|</div>
                    <div><a href="/shopping-cart/">Cart</a></div>
                </nav>
            </header>

                        <a href="/product_temp/" style="text-decoration: none; color:black;">
