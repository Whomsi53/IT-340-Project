<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OutOfStock | Home</title>

<link href="/style.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ===== PRODUCT GRID ===== */
.product-grid {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 40px 20px;
}

/* ===== CARD ===== */
.card {
    width: 200px;
    border-radius: 12px;
    padding: 15px;
    text-align: left;
    transition: 0.25s;
    background: #f4f4f4;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card p {
    font-weight: 700;
    margin: 8px 0 2px;
}

.productName {
    font-size: 14px;
    margin: 0;
}

.price {
    font-weight: 700;
    margin-top: 6px;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    color: white;
    margin-top: 50px;
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

main {
    flex: 1;
}
</style>
</head>

<body>

<!-- ✅ SHARED HEADER -->
<header>

    <!-- LEFT -->
    <div class="brand">
        <a href="/" style="text-decoration:none; color:white;">
            <h1 style="margin:0;">OutOfStock</h1>
        </a>
    </div>

    <!-- CENTER -->
    <div class="nav-center">
        <form class="search" onsubmit="handleSearch(event)">
            <input id="searchInput" placeholder="Search..." />
            <button type="submit">Search</button>
        </form>
    </div>

    <!-- RIGHT -->
    <nav class="nav-right">
        <span id="nav-user"></span>
        <a href="#" id="logout-btn" style="display:none;">Logout</a>
        <a href="/login/" id="login-link">Login</a>
        <span>|</span>
        <a href="/shopping-cart/">Cart</a>
    </nav>

</header>

<main>

<div class="product-grid">

<div class="card" onclick="display(this)">
    <img class="prod-img" src="/img/b_coat.png">
    <p>OutOfStock</p>
    <div class="productName">Men's Blue Coat</div>
    <div class="price">$250.50</div>
</div>

<div class="card" onclick="display(this)">
    <img class="prod-img" src="/img/o_coat.png">
    <p>OutOfStock</p>
    <div class="productName">Men's Brown Coat</div>
    <div class="price">$170.50</div>
</div>

<div class="card" onclick="display(this)">
    <img class="prod-img" src="/img/black_coat.png">
    <p>OutOfStock</p>
    <div class="productName">Men's Black Coat</div>
    <div class="price">$190.00</div>
</div>

<div class="card" onclick="display(this)">
    <img class="prod-img" src="/img/br_coat.png">
    <p>OutOfStock</p>
    <div class="productName">Men's Dark Brown Coat</div>
    <div class="price">$159.99</div>
</div>

<div class="card" onclick="display(this)">
    <img class="prod-img" src="/img/g_coat.png">
    <p>OutOfStock</p>
    <div class="productName">Men's Charcoal Coat</div>
    <div class="price">$250.50</div>
</div>

</div>

</main>

<footer>
© 2026 OutOfStock
</footer>

<script src="frontend.js"></script>

<script>
// ========================
// NAVBAR (FIXED + CONSISTENT)
// ========================
function updateNavbar() {
    let user = null;

    try {
        user = JSON.parse(sessionStorage.getItem("user"));
    } catch {
        user = null;
    }

    const navUser = document.getElementById("nav-user");
    const loginLink = document.getElementById("login-link");
    const logoutBtn = document.getElementById("logout-btn");

    if (user && user.username) {
        navUser.innerText = "Hello, " + user.username;
        loginLink.style.display = "none";
        logoutBtn.style.display = "inline";
    } else {
        navUser.innerText = "";
        loginLink.style.display = "inline";
        logoutBtn.style.display = "none";
    }
}

// ========================
// LOGOUT
// ========================
document.addEventListener("DOMContentLoaded", () => {
    updateNavbar();

    document.getElementById("logout-btn").addEventListener("click", () => {
        sessionStorage.clear();
        window.location.reload();
    });
});

// ========================
// SEARCH
// ========================
function handleSearch(e) {
    e.preventDefault();

    const query = document.getElementById("searchInput").value.trim();
    if (!query) return;

    window.location.href = `/product_temp/?name=${encodeURIComponent(productName)}&price=${encodeURIComponent(productPrice)}&img=${encodeURIComponent(productImg)}`;
}
</script>

</body>
</html>
