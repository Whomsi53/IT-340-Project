<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OutOfStock | Cart</title>

<link href="/style.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header></header>

<div id="toast" style="
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    opacity: 0;
    transition: 0.3s;
    z-index: 9999;
"></div>

<div class="container mt-4">

<h2 class="mb-4">Shopping Cart</h2>

<div id="cartItems"></div>

<hr>

<div class="d-flex justify-content-between">
    <div>
        <p><strong>Subtotal:</strong> <span id="subtotal">$0</span></p>
        <p><strong>Tax (6%):</strong> <span id="tax">$0</span></p>
        <p><strong>Shipping:</strong> <span id="shipping">$5.99</span></p>
        <p><strong>Total:</strong> <span id="total">$0</span></p>
    </div>

    <div class="text-end">
        <button class="btn btn-outline-secondary mb-2" onclick="window.location.href='/'">
            Continue Shopping
        </button>

        <br>

        <button class="btn btn-dark w-100" style="font-weight:700;" onclick="checkout()">
            Checkout
        </button>
    </div>
</div>

</div>

<footer class="text-center mt-5 p-3 bg-dark text-white">
© 2026 OutOfStock
</footer>

<script src="/navbar.js"></script>

<script>

// ========================
function showToast(msg) {
    const t = document.getElementById("toast");
    if (!t) return;

    t.textContent = msg;
    t.style.opacity = "1";

    setTimeout(() => {
        t.style.opacity = "0";
    }, 2000);
}

// ========================
function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
}

function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
}

// ========================
function normalize(item) {
    return {
        id: item.id,
        name: item.name || item.productName || "No name",
        image: item.image || item.productImg || "/img/default.png",
        price: typeof item.price === "string"
            ? parseFloat(item.price.replace("$",""))
            : (item.price || 0),
        qty: item.qty ?? item.quantity ?? 1
    };
}

// ========================
function loadCart() {
    let raw = getCart();
    let cart = raw.map(normalize);

    const container = document.getElementById("cartItems");
    if (!container) return;

    container.innerHTML = "";

    let subtotal = 0;

    if (!cart.length) {
        container.innerHTML = "<p class='text-muted'>Your cart is empty.</p>";
        document.getElementById("subtotal").textContent = "$0";
        document.getElementById("tax").textContent = "$0";
        document.getElementById("total").textContent = "$0";
        return;
    }

    cart.forEach((item, index) => {

        const { name, image, price, qty } = item;

        subtotal += price * qty;

        const div = document.createElement("div");
        div.className = "product mb-3 p-3 border rounded";

        div.innerHTML = `
            <div class="row align-items-center">
                <div class="col-md-2">
                    <img src="${image}" class="img-fluid">
                </div>

                <div class="col-md-4">
                    <p>${name}</p>
                </div>

                <div class="col-md-3">
                    <div class="input-group">
                        <button class="btn btn-outline-secondary" onclick="changeQty(${index}, -1)">-</button>
                        <input type="text" class="form-control text-center" value="${qty}" readonly>
                        <button class="btn btn-outline-secondary" onclick="changeQty(${index}, 1)">+</button>
                    </div>
                </div>

                <div class="col-md-2 text-end">
                    <span>$${(price * qty).toFixed(2)}</span>
                </div>

                <div class="col-md-1 text-end">
                    <button class="btn btn-danger btn-sm" onclick="removeItem(${index})">X</button>
                </div>
            </div>
        `;

        container.appendChild(div);
    });

    const tax = subtotal * 0.06;
    const shipping = subtotal > 0 ? 5.99 : 0;
    const total = subtotal + tax + shipping;

    document.getElementById("subtotal").textContent = "$" + subtotal.toFixed(2);
    document.getElementById("tax").textContent = "$" + tax.toFixed(2);
    document.getElementById("total").textContent = "$" + total.toFixed(2);
}

// ========================
function changeQty(index, change) {
    let cart = getCart();

    let current = cart[index].qty ?? cart[index].quantity ?? 1;

    current += change;

    if (current <= 0) {
        cart.splice(index, 1);
        showToast("Item removed");
    } else {
        cart[index].qty = current;
    }

    saveCart(cart);
    loadCart();
}

// ========================
function removeItem(index) {
    let cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    showToast("Removed from cart");
    loadCart();
}

// ========================
function checkout() {
    const cart = getCart();

    if (!cart.length) {
        showToast("Your cart is empty");
        return;
    }

    localStorage.removeItem("cart");

    showToast("Order placed successfully 🎉");

    setTimeout(() => {
        window.location.href = "/";
    }, 1200);
}

// ========================
document.addEventListener("DOMContentLoaded", () => {
    if (typeof renderNavbar === "function") {
        renderNavbar();
        updateNavbar();
    }
    loadCart();
});
</script>

</body>
</html>
