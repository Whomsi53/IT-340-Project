<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OutOfStock | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
<div class="main">  	
    <input type="checkbox" id="chk" aria-hidden="true">

    <!-- SIGN UP -->
    <div class="signup">
        <form onsubmit="register(event)">
            <label for="chk">Sign up</label>
            <input type="text" id="signup-username" placeholder="User name" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <button type="submit">Sign up</button>
        </form>
    </div>

    <!-- LOGIN -->
    <div class="login">
        <form onsubmit="login(event)">
            <label for="chk">Login</label>
            <input type="text" id="login-username" placeholder="User name" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</div>

<!-- ✅ TOAST element (matches your CSS) -->
<div id="toast" class="toast"></div>

<script>
const API_URL = "/api";

// REGISTER
async function register(e) {
    e.preventDefault();

    const username = document.getElementById('signup-username').value;
    const password = document.getElementById('signup-password').value;

    const res = await fetch(`${API_URL}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();
    showToast(data.message, data.success);
}

// LOGIN
async function login(e) {
    e.preventDefault();

    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;

    const res = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    showToast(data.message, data.success);

    if (data.success) {
        localStorage.setItem("user", username);

        setTimeout(() => {
            window.location.href = "/dashboard.html";
        }, 1200);
    }
}

// ✅ TOAST function (matches .toast CSS)
function showToast(message, success = true) {
    const toast = document.getElementById("toast");

    toast.innerText = message;
    toast.className = `toast show ${success ? "success" : "error"}`;

    setTimeout(() => {
        toast.className = "toast";
    }, 2500);
}
</script>

</body>
</html>
