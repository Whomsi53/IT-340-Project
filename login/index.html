<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Jost', sans-serif;
    background: linear-gradient(to bottom, #2e2e2e, #b1b1b1, #2e2e2e);
}

.main{
    width: 350px;
    height: 500px;
    overflow: hidden;
    background: linear-gradient(to bottom, #2e2e2e, #b1b1b1, #2e2e2e);
    border-radius: 10px;
    box-shadow: 5px 20px 50px #000;
}

#chk{ display: none; }

.signup{
    position: relative;
    width:100%;
    height: 100%;
}

label{
    color: #fff;
    font-size: 2.3em;
    display: flex;
    justify-content: center;
    margin: 50px;
    font-weight: bold;
    cursor: pointer;
    transition: .5s ease-in-out;
}

input{
    width: 60%;
    background: #e0dede;
    display: block;
    margin: 20px auto;
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 5px;
}

button{
    width: 60%;
    height: 40px;
    margin: 30px auto 10px;
    display: block;
    color: #fff;
    background: #81a8a0;
    font-size: 1em;
    font-weight: bold;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover{ background: #6e918a; }

.login{
    height: 460px;
    background: #eee;
    border-radius: 60% / 10%;
    transform: translateY(-180px);
    transition: .8s ease-in-out;
}

.login label{
    color: #81a8a0;
    transform: scale(.6);
}

#chk:checked ~ .login{
    transform: translateY(-500px);
}

#chk:checked ~ .login label{
    transform: scale(1);	
}

#chk:checked ~ .signup label{
    transform: scale(.6);
}

.toast {
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%) scale(0.95);
    padding: 14px 20px;
    border-radius: 8px;
    color: #fff;
    font-weight: 600;
    opacity: 0;
    z-index: 99999;
    transition: all 0.3s ease;
}
.toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
.toast.success { background: #2ecc71; }
.toast.error { background: #e74c3c; }
</style>
</head>

<body>

<div class="main">
    <input type="checkbox" id="chk" aria-hidden="true">

    <div class="signup">
        <form onsubmit="register(event)">
            <label for="chk">Sign up</label>
            <input id="signup-username" type="text" placeholder="Username" required>
            <input id="signup-password" type="password" placeholder="Password" required>
            <button>Sign up</button>
        </form>
    </div>

    <div class="login">
        <form onsubmit="login(event)">
            <label for="chk">Login</label>
            <input id="login-username" type="text" placeholder="Username" required>
            <input id="login-password" type="password" placeholder="Password" required>
            <button>Login</button>
        </form>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API_URL = "/api";

// ========================
// REGISTER
// ========================
async function register(e) {
    e.preventDefault();

    const username = document.getElementById('signup-username').value.trim();
    const password = document.getElementById('signup-password').value.trim();

    if (!username || !password) {
        showToast("Missing fields", false);
        return;
    }

    try {
        const res = await fetch(`${API_URL}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        showToast(data.message || "Registered", data.success);

    } catch (err) {
        console.error(err);
        showToast("Server error", false);
    }
}

// ========================
// LOGIN (FINAL FIX)
// ========================
async function login(e) {
    e.preventDefault();

    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();

    if (!username || !password) {
        showToast("Missing fields", false);
        return;
    }

    try {
        const res = await fetch(`${API_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!data.success || !data.user) {
            showToast("Invalid login", false);
            return;
        }

        // 🔥 CLEAN + SAFE SAVE
        localStorage.clear();

        localStorage.setItem("userId", String(data.user.id));

        const safeUsername =
            data.user.username &&
            data.user.username !== "undefined" &&
            data.user.username !== "null"
                ? data.user.username
                : username;

        localStorage.setItem("username", safeUsername);
        localStorage.setItem("role", data.user.role || "user");

        showToast("Login successful", true);

        setTimeout(() => {
            window.location.href = "/";
        }, 300);

    } catch (err) {
        console.error(err);
        showToast("Server error", false);
    }
}

// ========================
function showToast(message, success=true){
    const toast = document.getElementById("toast");
    if (!toast) return;

    toast.innerText = message;
    toast.className = `toast show ${success ? "success" : "error"}`;

    setTimeout(()=> toast.className="toast", 2500);
}
</script>

</body>
</html>
