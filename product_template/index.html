<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OutOfStock | Product</title>

<link href="/style.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

main {
    flex: 1;
}

.product-container {
    max-width: 900px;
    margin: 40px auto;
}

.product-img {
    width: 100%;
    border-radius: 12px;
}

.price {
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
}

.review-card {
    border: 1px solid #ddd;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

#toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    opacity: 0;
    transition: 0.3s;
    z-index: 9999;
}
</style>
</head>

<body>

<header></header>

<main>
<div id="toast"></div>

<div class="container product-container">

    <div class="row">
        <div class="col-md-5">
            <img id="productImg" class="product-img">
        </div>

        <div class="col-md-7" id="productInfo">
            <h2 id="productName"></h2>
            <div class="price"></div>
            <p id="productDesc"></p>

            <button id="addCartBtn" class="btn btn-dark mt-3" onclick="addToCart()">
                Add to Cart
            </button>
        </div>
    </div>

    <hr>

    <div id="reviewsBlock">
        <h4 id="reviewTitle">Reviews</h4>
        <div id="reviewsList"></div>

        <div id="reviewSection" class="mt-3">
            <textarea id="reviewText" class="form-control mb-2" placeholder="Write a review..."></textarea>
            <select id="reviewRating" class="form-select mb-2">
                <option value="5">5 Stars</option>
                <option value="4">4 Stars</option>
                <option value="3">3 Stars</option>
                <option value="2">2 Stars</option>
                <option value="1">1 Star</option>
            </select>
            <button class="btn btn-primary" onclick="submitReview()">Submit</button>
        </div>
    </div>

</div>
</main>

<footer class="text-center p-3 bg-dark text-white">
© 2026 OutOfStock
</footer>

<script src="/navbar.js"></script>

<script>
function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.opacity = "1";
    setTimeout(() => t.style.opacity = "0", 2000);
}

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let currentProduct = null;

// ========================
function resolveImage(p) {
    if (p.image) return p.image;

    if (p.category === "amazon") {
        return `/img/amazon${p.id - 17}.png`;
    }

    return "/img/default.png";
}

// ========================
async function loadProduct() {
    try {
        const res = await fetch("/api/products/all");
        const data = await res.json();

        const products = data.products || data;
        const p = products.find(x => String(x.id) === String(id));
        if (!p) return;

        currentProduct = p;

        document.getElementById("productName").textContent = p.name;
        document.querySelector(".price").textContent = "$" + p.price;
        document.getElementById("productImg").src = resolveImage(p);
        document.getElementById("productDesc").textContent = p.description || "";

        const info = document.getElementById("productInfo");

        // ✅ MARKETPLACE = just add seller (no removing anything)
        if (p.category === "marketplace") {
            const seller = document.createElement("p");
            seller.innerHTML = `<strong>Sold by:</strong> ${p.seller || "Seller"}`;
            seller.style.marginBottom = "10px";
            info.prepend(seller);
        }

        // ✅ AMAZON = special behavior
        if (p.category === "amazon") {
            document.getElementById("addCartBtn")?.remove();
            document.getElementById("reviewsBlock")?.remove();

            const btn = document.createElement("button");
            btn.className = "btn btn-warning mt-3";
            btn.innerText = "Shop on Amazon";

            btn.onclick = () => window.open(p.link, "_blank");

            info.appendChild(btn);
        }

    } catch (err) {
        console.error("LOAD PRODUCT ERROR:", err);
    }
}

// ========================
function addToCart() {
    if (!currentProduct) return;

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const existing = cart.find(i => i.id == currentProduct.id);

    if (existing) existing.qty++;
    else {
        cart.push({
            id: currentProduct.id,
            name: currentProduct.name,
            price: currentProduct.price,
            image: currentProduct.image,
            qty: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    showToast("Added to cart 🛒");
}

// ========================
async function loadReviews() {
    const res = await fetch("/api/reviews/" + id);
    if (!res.ok) return;

    const data = await res.json();
    const list = document.getElementById("reviewsList");

    if (!list) return;

    list.innerHTML = "";

    if (!data.reviews.length) {
        list.innerHTML = "<p>No reviews yet.</p>";
        return;
    }

    data.reviews.forEach(r => {
        const div = document.createElement("div");
        div.className = "review-card";

        div.innerHTML = `
            <strong>${r.username}</strong>
            <div>${"★".repeat(r.rating)}</div>
            <p>${r.comment}</p>
        `;

        list.appendChild(div);
    });
}

// ========================
async function submitReview() {
    const text = document.getElementById("reviewText").value;
    const rating = document.getElementById("reviewRating").value;

    await fetch("/api/reviews", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            product_id: id,
            comment: text,
            rating
        })
    });

    showToast("Review submitted ⭐");
    loadReviews();
}

// ========================
document.addEventListener("DOMContentLoaded", () => {
    renderNavbar();
    updateNavbar();

    loadProduct();
    loadReviews();
});
</script>

</body>
</html>
